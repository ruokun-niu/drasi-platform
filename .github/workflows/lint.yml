name: Rust Lint

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    uses: drasi-project/.github/.github/workflows/rust-lint.yaml@rust195
    with:
      install-jq: true
      # `make lint-check` recurses through every Cargo project and runs both
      # `cargo fmt -- --check` and `cargo clippy ...`, so the reusable
      # workflow's separate fmt job is intentionally a no-op below.
      clippy-command: make lint-check
      fmt-command: 'true'
      # Keep `-D warnings` so first-party warnings still fail the build, but
      # allow `unused_imports` and `unused_variables` because the vendored drasi-core submodule (pinned
      # to a commit older than the upstream fix) emits these warnings and we
      # don't want to bump the submodule in this PR.
      # We will remove the `-A` once we swtich to using crates
      rustflags: '-D warnings -A unused-imports -A unused-variables'

